# UniTalks coturn configuration.
# Copy this file to /etc/turnserver.conf on the server.
# After changes, run: sudo systemctl restart coturn

listening-port=3478
tls-listening-port=5349

# Replace with your EC2 public IP.
external-ip=REPLACE_WITH_EC2_IP

realm=unitalks.in
use-auth-secret

# Must match TURN_SECRET environment variable used by backend.
static-auth-secret=REPLACE_WITH_TURN_SECRET

no-multicast-peers
no-cli
log-file=/var/log/coturn/turn.log
min-port=49152
max-port=65535

