# WebSocket backlog and SYN queue sizing
net.core.somaxconn = 4096
net.ipv4.tcp_max_syn_backlog = 4096

# Reuse TIME_WAIT sockets for client-side reconnect churn
net.ipv4.tcp_tw_reuse = 1

# Widen ephemeral ports for high outbound connection concurrency
net.ipv4.ip_local_port_range = 1024 65535

# NIC packet backlog for bursty ingress
net.core.netdev_max_backlog = 4096

# Faster dead socket cleanup
net.ipv4.tcp_fin_timeout = 15

# Keepalive tuning for long-lived WS sessions
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5
