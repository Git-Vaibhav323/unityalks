# Production-ready NGINX config for UniTalks WebSocket traffic.
# This file is intended to be included as main nginx.conf or adapted into it.

worker_processes auto;
worker_rlimit_nofile 65536;

events {
  # Raised from default 1024 to support high connection fan-in.
  worker_connections 4096;
}

http {
  # Keepalive balances low reconnect churn and resource use.
  keepalive_timeout 75s;

  # HTTP gzip only. WebSocket frames are not gzipped by nginx proxying.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;
  gzip_min_length 256;

  # Connection limiting to reduce abuse / low-effort floods.
  limit_conn_zone $binary_remote_addr zone=ws_limit:10m;

  upstream websocket_backend {
    least_conn;
    server 127.0.0.1:8080;
    # server 127.0.0.1:8081;  # enable when scaling out
    # server 127.0.0.1:8082;  # enable when scaling out
    keepalive 64;
  }

  server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # TLS: required for browser WebRTC + WSS in production.
    ssl_certificate /etc/letsencrypt/live/yourdomain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Enable buffered access logs in production (avoid per-request sync IO).
    access_log /var/log/nginx/access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/error.log warn;

    location /ws {
      limit_conn ws_limit 20;

      proxy_pass http://websocket_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # Long-lived websocket sessions.
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location / {
      proxy_pass http://websocket_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
    }
  }
}
