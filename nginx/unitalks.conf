worker_processes auto;

events {
  worker_connections 1024;
}

http {
  limit_req_zone $binary_remote_addr zone=unitalks_http:10m rate=20r/s;

  gzip on;
  gzip_types text/html text/css application/javascript application/json;
  gzip_min_length 256;

  upstream unitalks_backend {
    server 127.0.0.1:8080;
  }

  server {
    listen 80;
    server_name unitalks.in;

    client_max_body_size 1m;

    root /var/www/unitalks;
    index index.html;

    location /ws {
      proxy_pass http://unitalks_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location / {
      try_files $uri $uri/ @backend_or_spa;
    }

    location @backend_or_spa {
      limit_req zone=unitalks_http burst=40 nodelay;
      proxy_pass http://unitalks_backend;
      proxy_http_version 1.1;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Host $host;
    }
  }
}

